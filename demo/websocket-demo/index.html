<!DOCTYPE html>
<html>
<head>
    <title>WebSocket简单示例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        #messages {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 10px;
        }
        #messageInput {
            width: 70%;
            padding: 5px;
        }
        button {
            padding: 5px 15px;
        }
        .status {
            margin-bottom: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <h2>WebSocket简单聊天</h2>
    <div class="status" id="status">状态: 未连接</div>
    
    <div id="messages"></div>
    
    <input type="text" id="messageInput" placeholder="输入消息..." disabled>
    <button id="sendButton" disabled>发送</button>
    <button id="connectButton">连接服务器</button>
    
    <script>
        let ws = null;
        
        // 连接按钮
        document.getElementById('connectButton').onclick = function() {
            // 创建WebSocket连接
            ws = new WebSocket('ws://localhost:8080');
            
            // 连接打开时
            ws.onopen = function() {
                document.getElementById('status').innerHTML = '状态: <span style="color:green">已连接</span>';
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendButton').disabled = false;
                document.getElementById('connectButton').disabled = true;
                addMessage('系统', '已连接到服务器');
            };
            
            // 收到消息时
            ws.onmessage = function(event) {
                addMessage('收到', event.data);
            };
            
            // 连接关闭时
            ws.onclose = function() {
                document.getElementById('status').innerHTML = '状态: <span style="color:red">已断开</span>';
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendButton').disabled = true;
                document.getElementById('connectButton').disabled = false;
                addMessage('系统', '连接已断开');
            };
            
            // 发生错误时
            ws.onerror = function(error) {
                addMessage('错误', '连接失败');
                console.error('WebSocket错误:', error);
            };
        };
        
        // 发送按钮
        document.getElementById('sendButton').onclick = function() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(message);
                addMessage('我', message);
                input.value = '';
            }
        };
        
        // 按回车发送消息
        document.getElementById('messageInput').onkeypress = function(e) {
            if (e.key === 'Enter') {
                document.getElementById('sendButton').click();
            }
        };
        
        // 添加消息到显示区域
        function addMessage(sender, message) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.innerHTML = `<strong>${sender}:</strong> ${message}`;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
