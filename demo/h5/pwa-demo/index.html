<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日名言 - PWA示例</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入manifest文件 -->
    <link rel="manifest" href="manifest.json">
    <!-- 设置主题色 -->
    <meta name="theme-color" content="#2196f3">
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 每日名言</h1>
            <p class="subtitle">每天一句，启发思考</p>
        </header>
        
        <main>
            <div class="quote-card">
                <div id="quote" class="quote">加载中...</div>
                <div id="author" class="author"></div>
            </div>
            
            <div class="controls">
                <button id="new-quote" class="btn">🔄 新名言</button>
                <button id="share-quote" class="btn">📤 分享</button>
            </div>
            
            <div id="status" class="status"></div>
        </main>
        
        <footer>
            <p>📱 可以添加到主屏幕使用</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
