<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDB Demo - IndexedDB 核心功能展示</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🗄️ IDB (IndexedDB) 核心功能演示</h1>

    <!-- 数据库操作面板 -->
    <section class="panel">
      <h2>1. 数据库初始化</h2>
      <div class="button-group">
        <button id="btnInit">打开/初始化数据库</button>
      </div>
      <div id="initStatus" class="status"></div>
    </section>

    <!-- CRUD 操作 -->
    <section class="panel">
      <h2>2. 基本 CRUD 操作</h2>

      <div class="form-group">
        <label>添加数据:</label>
        <input type="text" id="inputKey" placeholder="键 (key)">
        <input type="text" id="inputValue" placeholder="值 (value)">
        <button id="btnAdd">添加</button>
      </div>

      <div class="form-group">
        <label>读取数据:</label>
        <input type="text" id="getKey" placeholder="要查询的键">
        <button id="btnGet">查询</button>
      </div>

      <div class="form-group">
        <label>更新数据:</label>
        <input type="text" id="updateKey" placeholder="键">
        <input type="text" id="updateValue" placeholder="新值">
        <button id="btnUpdate">更新</button>
      </div>

      <div class="form-group">
        <label>删除数据:</label>
        <input type="text" id="deleteKey" placeholder="要删除的键">
        <button id="btnDelete">删除</button>
      </div>

      <div id="crudResult" class="result"></div>
    </section>

    <!-- 批量操作 -->
    <section class="panel">
      <h2>3. 批量操作 (addAll)</h2>
      <div class="button-group">
        <button id="btnAddAll">批量添加示例数据</button>
        <button id="btnGetAll">获取所有数据</button>
        <button id="btnClear">清空数据</button>
      </div>
      <div id="batchResult" class="result"></div>
    </section>

    <!-- 索引查询 -->
    <section class="panel">
      <h2>4. 索引查询 (用户表示例)</h2>
      <div class="form-group">
        <label>添加用户:</label>
        <input type="text" id="userName" placeholder="姓名">
        <input type="number" id="userAge" placeholder="年龄">
        <input type="email" id="userEmail" placeholder="邮箱">
        <button id="btnAddUser">添加用户</button>
      </div>
      <div class="button-group">
        <button id="btnGetAllUsers">显示所有用户</button>
        <button id="btnGetByAge">按年龄查询 (>18)</button>
        <button id="btnGetByEmail">按邮箱查询</button>
      </div>
      <div id="userResult" class="result"></div>
    </section>

    <!-- 事务操作 -->
    <section class="panel">
      <h2>5. 事务操作</h2>
      <div class="button-group">
        <button id="btnTransaction">执行事务 (批量添加 + 回滚演示)</button>
      </div>
      <div id="transactionResult" class="result"></div>
    </section>

    <!-- 数据显示区域 -->
    <section class="panel">
      <h2>📊 数据显示</h2>
      <div id="dataDisplay" class="data-display">
        <p>暂无数据</p>
      </div>
    </section>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
